<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U S  C Y B E R</title>
    <meta property="og:title" content="U S  C Y B E R">
    <meta property="og:type" content="website">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=block" rel="stylesheet">
    <style>
        :root {
            --primary-text: #DFDFDF;
            --secondary-text: #242424;
            --nav-text: #9b9b9b;
            --background-dark: #242424;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            color: var(--secondary-text);
            margin: 0;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            z-index: -1;
        }

        .section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 3rem;
            position: relative;
            z-index: 1;
        }

        .music-section {
            min-height: 75vh;
            padding: 1rem;
            background: transparent;
            z-index: 1;
        }

        .home-section, .about-section {
            background-color: var(--background-dark);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .nav-link {
            color: var(--nav-text);
            font-size: 0.7rem;
            text-decoration: none;
            letter-spacing: 0.2em;
            margin: 0 0.1rem;
        }

        .nav-link:hover {
            color: var(--secondary-text);
        }

        .social-icon {
            width: 48px;
            height: 48px;
            margin: 0.5rem;
        }

        .youtube-icon {
            height: 48px;
            width: auto;
            margin: 0.5rem;
        }

        .subtitle {
            color: var(--primary-text);
            font-size: clamp(0.5rem, 2.5vw, 1rem);
            font-weight: 600;
            text-align: center;
            letter-spacing: 0.2em;
            margin-bottom: 6rem;
        }

        .album-subtitle {
            color: var(--primary-text);
            font-size: 1.25rem;
            font-weight: 600;
            text-align: center;
            letter-spacing: 0.2em;
            margin-bottom: 1rem;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.8), 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .copyright {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: var(--primary-text);
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            padding: 0.5rem 0;
            z-index: 2;
            margin-top: auto;
        }

        .copyright-logo {
            height: 0.75rem;
            width: auto;
            object-fit: contain;
        }

        .hero-title {
            font-size: clamp(2rem, 7vw, 5rem);
            font-weight: 600;
            text-align: center;
            color: var(--primary-text);
            letter-spacing: 0.8em;
            margin-bottom: 4rem;
            max-width: 110vw;
            white-space: nowrap;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: bold;
            text-align: left;
            width: 100%;
            letter-spacing: 0.2em;
            margin-bottom: 1.5rem;
            color: var(--primary-text);
            padding: 1.5rem;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.8), 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .about-text {
            color: var(--primary-text);
            font-size: 1.25rem;
            font-weight: bold;
            text-transform: uppercase;
            max-width: 90%;
            text-align: left;
            margin-left: auto;
            margin-right: auto;
            letter-spacing: 0.15em;
        }

        .youtube-iframe {
            width: 100%;
            max-width: 700px;
            height: calc(100vw * 9 / 16);
            max-height: 394px;
            margin-bottom: 3rem;
            border: 0;
        }

        .album-art {
            width: 100%;
            max-width: 400px;
            height: auto;
            object-fit: contain;
            margin-bottom: 2.5rem;
            animation: glow 3s ease-in-out infinite;
        }

        .top-left-image {
            position: absolute;
            top: 50%;
            left: 7px;
            width: 25px;
            height: 25px;
            object-fit: contain;
            transform: translateY(-50%);
            z-index: 20;
        }

        .nav-container {
            position: relative;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0.75rem 1rem;
        }

        .remedial-logo {
            max-width: 90vw;
            max-height: 50vh;
            object-fit: contain;
        }

        .starfield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes glow {
            0% { box-shadow: 0 0 10px rgba(255, 255, 255, 0.4); }
            50% { box-shadow: 0 0 30px rgba(255, 255, 255, 1.5); }
            100% { box-shadow: 0 0 10px rgba(255, 255, 255, 0.4); }
        }

        @keyframes text-glow {
            0% { text-shadow: 0 0 3px rgba(255, 255, 255, 0.2); }
            50% { text-shadow: 0 0 8px rgba(255, 255, 255, 0.5), 0 0 15px rgba(255, 255, 255, 0.3); }
            100% { text-shadow: 0 0 3px rgba(255, 255, 255, 0.2); }
        }

        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .typewriter-glow {
            overflow: hidden;
            white-space: nowrap;
            animation: typing-long 7s steps(22, end) 2s, show 0s 2s forwards, text-glow 3s ease-in-out 9s infinite;
            visibility: hidden;
            animation-fill-mode: forwards;
            display: inline-block;
            width: 0;
            min-height: 1.5rem;
            color: var(--primary-text);
            margin-bottom: 2.5rem;
            font-size: clamp(.5rem, 3vw, 2rem);
            font-weight: 600;
            text-align: center;
            letter-spacing: 0.5em;
        }

        @keyframes typing-long {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes show {
            to { visibility: visible; }
        }

        /* Media Queries */
        @media (max-width: 1340px) {
            .hero-title {
                font-size: clamp(0.5rem, 3.2vw, 1.25rem);
            }
        }

        @media (max-width: 720px) {
            .section {
                padding: 0.5rem;
            }
            .music-section {
                padding: 0.5rem;
                min-height: 60vh;
            }
            .hero-title {
                font-size: clamp(0.5rem, 2.5vw, 0.7rem);
            }
            .album-subtitle {
                font-size: 1rem;
            }
            .about-text {
                font-size: 1.125rem;
                max-width: 95%;
            }
            .section-title {
                font-size: 1.25rem;
            }
        }

        @media (max-width: 480px) {
            .nav-link {
                font-size: 0.6rem;
            }
            .top-left-image {
                width: 20px;
                height: 20px;
            }
            .copyright {
                font-size: 0.8rem;
            }
            .copyright-logo {
                height: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <section id="home" class="section home-section">
        <canvas class="starfield"></canvas>
        <h1 class="hero-title fade-in">U S    C Y B E R</h1>
        <a class="typewriter-glow fade-in">CAUTION:  DO NOT ENTER</a>
    </section>
    <section id="about" class="section about-section">
        <canvas class="starfield"></canvas>
        <div class="copyright fade-in">
            <span>©2026</span>
        </div>
    </section>
    <script defer>
        // Fade-in animation
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry, index) => {
                if (entry.isIntersecting) {
                    setTimeout(() => entry.target.classList.add('visible'), index * 100);
                }
            });
        }, { threshold: 0.2 });

        document.querySelectorAll('.fade-in').forEach(element => observer.observe(element));

        // Starfield effect
        document.querySelectorAll('.starfield').forEach(canvas => {
            const ctx = canvas.getContext('2d');
            let stars = [];

            const resizeCanvas = () => {
                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;
                stars = Array.from({ length: Math.floor((canvas.width * canvas.height) / 10000) }, () => ({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 1 + 0.3,
                    speed: Math.random() * 0.2 + 0.05,
                    opacity: Math.random() * 0.3 + 0.2
                }));
            };

            const drawStars = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                stars.forEach(star => {
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                    ctx.globalAlpha = star.opacity;
                    ctx.fill();
                    star.y += star.speed;
                    if (star.y > canvas.height) star.y = 0;
                });
                ctx.globalAlpha = 1.0;
            };

            const animate = () => {
                drawStars();
                requestAnimationFrame(animate);
            };

            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
            animate();
        });
    </script>
</body>
</html>
